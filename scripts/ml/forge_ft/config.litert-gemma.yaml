# Community LiteRT Models Configuration
# This configuration references community LiteRT models from Hugging Face
# No custom training required - using pre-built community models

# Base community models to use
community_models:
  - model_id: gemma-3-1b-it-web
    name: Gemma 3 1B IT (LiteRT Web)
    community_repo: litert-community/Gemma3-1B-IT
    file: Gemma3-1B-IT_multi-prefill-seq_q4_ekv4096.litertlm
    power_tier: balanced
    context_window_size: 4096
    size_mb: 1200

  - model_id: gemema-4-e2b-it-web
    name: Gemma 4 E2B IT (LiteRT Web)
    community_repo: google/gemma-4-e2b-it-litert
    file: gemma-4-e2b-it-web.litertlm
    power_tier: balanced
    context_window_size: 8192
    size_mb: 1200

  - model_id: gemma-2-2b-it-web
    name: Gemma 2 2B IT (LiteRT Web)
    community_repo: google/gemma-2-2b-it-litert
    file: gemma-2-2b-it-web.litertlm
    power_tier: balanced
    context_window_size: 4096
    size_mb: 1600

  - model_id: gemma-2-9b-it-web
    name: Gemma 2 9B IT (LiteRT Web)
    community_repo: google/gemma-2-9b-it-litert
    file: gemma-2-9b-it-web.litertlm
    power_tier: performance
    context_window_size: 8192
    size_mb: 5400

  - model_id: phi-3-mini-4k-web
    name: Phi-3 Mini 4K (LiteRT Web)
    community_repo: litert-community/Phi-3-mini-4k-instruct
    file: Phi-3-mini-4k-instruct_q4_ekv2048.litertlm
    power_tier: efficiency
    context_window_size: 4096
    size_mb: 2300

  - model_id: llama-3.2-1b-web
    name: Llama 3.2 1B (LiteRT Web)
    community_repo: litert-community/Llama-3.2-1B-Instruct
    file: Llama-3.2-1B-Instruct_q4_ekv2048.litertlm
    power_tier: efficiency
    context_window_size: 4096
    size_mb: 800

# Optional: Custom fine-tuning configuration (if you want to fine-tune on top of community models)
# fine_tuning:
#   base_model: litert-community/Gemma3-1B-IT
#   model_name: my-custom-gemma3-1b
#   training:
#     batch_size: 4
#     learning_rate: 2e-5
#     num_epochs: 3
#     max_seq_length: 4096
#   data:
#     training_data_path: ./data/my_training.jsonl
#     validation_data_path: ./data/my_validation.jsonl

# Manifest generation
manifest:
  output_path: ../public/litert-models.manifest.json
  version: 8
  # Models are automatically generated from community_models list above
