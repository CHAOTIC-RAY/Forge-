<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <link rel="icon" type="image/png" href="logo192x192.png" />
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Forge</title>
    <script src="https://js.puter.com/v2/"></script>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <script>
      // Aggressively force unregister service workers to clear potential COEP/COOP blockage and stale bundles
      // This is crucial for resolving "ReferenceError: useSpring" and "MIME type text/html" errors
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister().then(function() {
              console.log("[PWA] ServiceWorker unregistered successfully");
              // After unregistering, we might want to reload if it's the first time
              if (!sessionStorage.getItem('pwa_cleared')) {
                sessionStorage.setItem('pwa_cleared', 'true');
                window.location.reload();
              }
            });
          }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
