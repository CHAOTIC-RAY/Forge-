<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <link rel="icon" type="image/png" href="logo192x192.png" />
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Forge</title>
    <script src="https://js.puter.com/v2/"></script>
  </head>
  <body class="bg-gray-950 text-gray-100">
    <script>
      // Force unregister service workers to clear potential COEP/COOP blockage from PWA
      // This helps resolve "MIME type text/html" issues caused by stale service workers intercepting script requests
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log("[PWA] ServiceWorker unregistered");
          }
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
