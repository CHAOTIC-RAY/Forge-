<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #ffffff;
      --text: #171717;
      --border: #e5e7eb;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --surface: #f3f4f6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #f8fafc;
        --border: #334155;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --surface: #1e293b;
      }
    }
    body { 
      width: 350px; 
      height: 500px;
      margin: 0;
      padding: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }
    h1 {
      font-size: 18px;
      font-weight: 700;
      margin: 16px;
      text-align: center;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 0;
      background: none;
      color: var(--text);
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      font-weight: bold;
      font-size: 12px;
      border-radius: 0;
      margin: 0;
    }
    .tab-btn.active {
      border-bottom: 2px solid var(--primary);
      color: var(--primary);
    }
    .view-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .view { display: none; }
    .view.active { display: block; }
    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      resize: vertical;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      margin-bottom: 12px;
      background: var(--primary); 
      color: white; 
      border: none; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600;
      transition: background 0.2s;
    }
    button:hover { background: var(--primary-hover); }
    .status { margin-top: 10px; font-size: 12px; color: #64748b; text-align: center; }
    .widget-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .widget-grid button { margin-bottom: 0; }
    .text-sm { font-size: 14px; margin-bottom: 8px; display: block; color: #64748b; font-weight: bold; }
    
    /* Chat specific styles */
    .chat-history {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      min-height: 200px;
    }
    .chat-msg {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .chat-msg.user {
      background: var(--primary);
      color: white;
      align-self: flex-end;
      max-width: 80%;
    }
    .chat-msg.ai {
      background: var(--surface);
      border: 1px solid var(--border);
      align-self: flex-start;
      max-width: 90%;
    }
    .chat-img-preview {
      max-height: 80px;
      border-radius: 4px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      display: none;
    }
    
    /* Calendar styles */
    .calendar-item {
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      background: var(--surface);
    }
    .calendar-item-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
    .calendar-item-date { font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  
  <div class="tabs" id="mainTabs">
    <button class="tab-btn" data-target="settingsView" id="navSettings">Login</button>
    <button class="tab-btn active" data-target="captureView" id="navCapture" disabled style="opacity: 0.5;">Capture</button>
    <button class="tab-btn" data-target="chatView" id="navChat" disabled style="opacity: 0.5;">Chat UI</button>
    <button class="tab-btn" data-target="calendarView" id="navCalendar" disabled style="opacity: 0.5;">Calendar</button>
  </div>

  <div class="view-container">
    
    <div id="settingsView" class="view">
      <div id="setupStep1">
        <label class="text-sm">1. Target Forge Application</label>
        <input type="text" id="forgeUrl" placeholder="https://your-forge.com/*" value="https://ais-dev-lkdab6rylgfzl4qvouhnor-22311204047.asia-southeast1.run.app/*" />
        <button id="connectBtn">Connect to Open Tab</button>
      </div>

      <div id="setupStep2" style="display: none; margin-top: 16px;">
        <div style="border-top: 1px solid var(--border); margin: 16px 0;"></div>
        <label class="text-sm">2. Select Routing Workspace</label>
        <p id="loggedInUserText" style="font-size:12px; margin-bottom:8px;">Logged in as: ...</p>
        <select id="workspaceSelect" style="width:100%; padding: 8px; margin-bottom: 12px; border-radius: 6px; background:var(--surface); color:var(--text); border:1px solid var(--border);"></select>
        <button id="saveWorkspaceBtn">Finalize Connection</button>
      </div>

      <div id="loginStatus" class="status"></div>
    </div>

    <div id="captureView" class="view active">
      <label class="text-sm">Page Scraping</label>
      <div class="widget-grid">
        <button id="clipBasicBtn">Standard DOM Scrape</button>
        <button id="clipFirecrawlBtn">Firecrawl Scrape (Advanced)</button>
      </div>
      
      <div style="border-top: 1px solid var(--border); margin: 16px 0;"></div>
      
      <label class="text-sm">Screenshots</label>
      <div class="widget-grid">
        <button id="screenshotVisibleBtn">Capture Visible Area</button>
        <button id="screenshotFullBtn">Capture Full Page (DevTools)</button>
      </div>

      <div style="border-top: 1px solid var(--border); margin: 16px 0;"></div>
      
      <label class="text-sm">Quick Note</label>
      <div class="widget-grid">
        <textarea id="quickNoteText" rows="3" placeholder="Jot down a quick idea..."></textarea>
        <button id="quickNoteBtn">Send to Forge</button>
      </div>
      
      <div id="captureStatus" class="status"></div>
    </div>
    
    <div id="chatView" class="view">
      <div class="chat-history" id="chatHistory">
        <div class="chat-msg ai">Hello! I am connected to Forge. Ask me anything about this page or your notes.</div>
      </div>
      <div class="chat-input-area">
        <img id="chatImagePreview" class="chat-img-preview" src="" alt="preview" />
        <textarea id="chatInput" rows="2" placeholder="Ask AI..."></textarea>
        <div style="display:flex; gap: 8px;">
          <button id="chatAttachBtn" style="flex:1; background: var(--surface); color: var(--text); border: 1px solid var(--border);">Attach Screen</button>
          <button id="chatSendBtn" style="flex:1;">Send AI</button>
        </div>
      </div>
    </div>

    <div id="calendarView" class="view">
      <button id="refreshCalendarBtn">Refresh Calendar</button>
      <div id="calendarList">
        <div class="status">Click refresh to load upcoming posts from Forge...</div>
      </div>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
