<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 300px; padding: 16px; font-family: sans-serif; }
    button { 
      width: 100%; padding: 10px; background: #2665fd; color: white; 
      border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
    }
    button:hover { background: #1e50ca; }
    .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
    .status { margin-top: 10px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div class="title">Forge Clipper</div>
  <button id="clipBtn">Clip to Notebook</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
